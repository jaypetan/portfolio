name: Deploy to Vercel

# This workflow runs whenever code is pushed to the main branch
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - uses: actions/checkout@v5

      # Set up environment and dependencies
      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

        # Validate that all required secrets are present before proceeding
      - name: Validate required secrets
        run: |
          for var in VERCEL_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID; do
            if [ -z "${!var}" ]; then
              echo "Missing required secret: $var"
              exit 1
            fi
          done

        # Verify the Vercel API works
      - name: Verify Vercel project access
        run: |
          HTTP_CODE=$(curl -s -o response.json -w "%{http_code}" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v9/projects/$VERCEL_PROJECT_ID?teamId=$VERCEL_ORG_ID")

          echo "Vercel API status: $HTTP_CODE"
          cat response.json

          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "Vercel project lookup failed. Check VERCEL_TOKEN, VERCEL_ORG_ID, and VERCEL_PROJECT_ID."
            exit 1
          fi

        # Prepare and deploy the project to Vercel using the CLI
      - name: Pull Vercel environment information
        run: npx vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build Vercel artifacts
        run: npx vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy prebuilt artifacts to Vercel
        run: npx vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
